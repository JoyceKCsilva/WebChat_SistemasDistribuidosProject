<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Web App</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="login-popup">
            <h2>Bem-vindo ao Chat</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="Digite seu nome de usuário" />
                <button id="join-btn">Entrar</button>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Chat em Grupo</h2>
            <div id="user-display"></div>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="message-input-container">
            <div class="message-input">
                <input type="text" id="message" placeholder="Digite sua mensagem..." />
                
                <label for="image-upload" class="image-upload-icon-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px">
                        <path d="M0 0h24v24H0V0z" fill="none"/>
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.03 2.47 5.5 5.5 5.5s5.5-2.47 5.5-5.5V6h-1.5z"/>
                    </svg>
                    </label>

                <input
                    type="file"
                    id="image-upload"
                    accept="image/*"
                    style="display: none;" />

                <button id="send-btn">Enviar</button>
            </div>
        </div>
    </div>
    
    <script src="js/chat.js"></script>
</body>
</html>
